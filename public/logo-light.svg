<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%" fill="none">
  <!-- Coding Brackets: Blue / Cyan Color Accents -->
  <path d="M 160,135 L 115,180 L 160,225" stroke="#2563EB" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 340,135 L 385,180 L 340,225" stroke="#06B6D4" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Binary Algorithm Connections -->
  <line x1="250" y1="120" x2="200" y2="220" stroke="#0F172A" stroke-width="8" stroke-linecap="round" />
  <line x1="250" y1="120" x2="300" y2="220" stroke="#0F172A" stroke-width="8" stroke-linecap="round" />
  
  <!-- Joint Small Pins -->
  <circle cx="250" cy="170" r="8" fill="#0F172A" />

  <!-- Nodes circles -->
  <circle cx="250" cy="100" r="24" fill="#2563EB" />
  <circle cx="200" cy="235" r="24" fill="#8B5CF6" />
  <circle cx="300" cy="235" r="24" fill="#8B5CF6" />

  <style>
    .brand-title { font-family: monospace; font-weight: 900; font-size: 80px; }
    .brand-tagline { font-family: sans-serif; font-weight: 500; font-size: 20px; fill: #475569; letter-spacing: 0.5px; }
  </style>

  <!-- CPKit Wordmark Text -->
  <text x="250" y="345" text-anchor="middle" class="brand-title" fill="#0F172A">CP<tspan fill="#06B6D4">Kit</tspan></text>

  <!-- Divider line -->
  <line x1="100" x2="390" y1="380" y2="380" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" />
  <circle cx="395" cy="380" r="5" fill="#8B5CF6" />

  <!-- Tagline Text -->
  <text x="250" y="420" text-anchor="middle" class="brand-tagline">Everything a Competitive Programmer Needs</text>
</svg>
